defaults:
  - _self_
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .

seed: 42

datamodule:
  _target_: data_cs.CSDataModule
  lambda_c_min: 200
  lambda_c_max: 1500
  lambda_p_min: 3
  lambda_p_max: 20
  lambda_d_min: 10
  lambda_d_max: 20
  num_stromal_samples: 50
  num_batches: 200
  batch_size: 256
  train_split: 0.8
  val_split: 0.1

encoder:
  _target_: encoder.EncoderDRNPE
  objective: "drnpe dual"
  kl_ball_threshold: 1.0
  initial_lambda: 1.0
  z_dim: 3
  x_dim: 4
  z_noise_stdev: 0.1
  x_noise_stdev: 0.1
  num_hidden_channels: 64
  lr: 1e-4

trainer:
  _target_: lightning.Trainer
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: logs
    name: cs_${encoder._target_}_${now:%m-%d-%H-%M}
    version: ""
  callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: val_loss
      patience: 50
      mode: min
      verbose: true
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: val_loss
      mode: min
      save_top_k: 1
      filename: "network_epoch{epoch}"
      auto_insert_metric_name: false
      verbose: true
