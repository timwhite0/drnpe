defaults:
  - _self_
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .

seed: 42

datamodule:
  _target_: data_gaussian.GaussianDataModule
  prior_stdev: 2.5
  likelihood_stdev: 1.0
  num_observations: 100
  num_batches: 100
  batch_size: 256
  train_split: 0.8
  val_split: 0.1

encoder:
  _target_: encoder.EncoderNPEFlow
  z_dim: 1
  x_dim: 2
  num_hidden_channels: 50
  lr: 1e-4
  num_transforms: 8
  num_bins: 8
  num_blocks: 1
  tail_bound: 10.0

trainer:
  _target_: lightning.Trainer
  max_epochs: 1000
  accelerator: gpu
  devices: 1
  logger:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: logs
    name: npe_flow
    version: ""
  callbacks:
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: val_loss
      patience: 50
      mode: min
      verbose: true
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: val_loss
      mode: min
      save_top_k: 1
      filename: "network_epoch{epoch}"
      auto_insert_metric_name: false
      verbose: true
